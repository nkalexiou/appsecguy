site_name: AppSecGuy Blog
site_url: https://appsecguy.se
theme:
  name: material
  icon:
    logo: fontawesome/solid/a
  font:
    text: DM Sans
    code: DM Mono
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.follow
    - search.highlight
    - search.suggest
  palette:
    # Dark Mode (default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    # Light Mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Blog:
      - Blog Home: blog/index.md
      - Tags: blog/tags.md
  - "Let's Talk ↗": https://www.alexiou.dev/#contact

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details

plugins:
  - blog
  - tags
  - search
